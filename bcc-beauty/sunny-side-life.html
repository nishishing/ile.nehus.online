<style>
:root{
  --bg:#0e0e11;
  --panel:#16161c;
  --text:#ffffff;
  --muted:#b5b5c0;
  --accent:#c9ffd9;
  --line:#06c755;
  --radius:18px;
  --max:1100px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
}
a{color:inherit;text-decoration:none}
.container{width:min(var(--max),calc(100% - 40px));margin:auto}

header{padding:20px 0;border-bottom:1px solid #222}
.header-inner{display:flex;justify-content:space-between;align-items:center;gap:16px}
.logo{font-weight:800;letter-spacing:.05em}
.insta{color:var(--muted);font-size:.9rem}

section{padding:36px 0}
h2{font-size:1.4rem;margin:0 0 14px}
.grid{display:grid;gap:14px}
.grid.cols3{grid-template-columns:repeat(3,1fr)}
.grid.cols2{grid-template-columns:repeat(2,1fr)}

.card{background:var(--panel);border-radius:var(--radius);padding:20px;transition:.15s}
a.card:hover{background:#1f1f27}
.card h3{margin:0 0 8px;font-size:1.05rem}
.card p{margin:0;color:var(--muted);font-size:.95rem}

.btn{display:block;text-align:center;padding:14px 16px;border-radius:14px;background:#1f1f27;font-weight:600;transition:.15s}
.btn:hover{background:#2a2a36}
.btn-line{background:var(--line);color:#fff}
.btn-line:hover{background:#05b34c}

.back{display:inline-block;color:var(--muted);font-size:.9rem;margin:24px 0 4px}
.back:hover{color:#fff}
.eyebrow{color:var(--accent);font-size:.85rem;margin:0 0 6px}
.detail-title{font-size:1.6rem;margin:0 0 14px}
.lead{color:var(--muted);max-width:760px}
.small{font-size:.85rem;color:var(--muted)}

@media(max-width:900px){.grid.cols3,.grid.cols2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="container header-inner">
    <div class="logo"><a href="index.html">BCC</a></div>
    <a class="insta" href="https://lin.ee/aQTLZGG" target="_blank" rel="noopener noreferrer">最新情報は公式LINEで →</a>
  </div>
</header>
<main class="container">
  <a class="back" href="index.html">← BCC トップに戻る</a>

  <section style="padding-top:18px">

    <h1 class="detail-title">SUNNY SIDE LIFE</h1>
    <p class="lead">内装・空間づくりの相談先。</p>
    <p class="lead" style="margin-top:14px">料金・導入の流れ・詳しい内容は、公式LINEからお気軽にお問い合わせください。あなたのサロンの状況に合わせてご案内します。</p>
  </section>

  <section style="padding-top:0">
    <h2>お問い合わせ・ご相談</h2>
    <div class="grid cols2">
      <a class="btn btn-line" href="https://lin.ee/aQTLZGG" target="_blank" rel="noopener noreferrer">公式LINEで相談する</a>
      <a class="btn" href="https://line.me/ti/g2/Mzs6FgiX6-gHl9kRAesPADRvcjVkVdlc-wPdCg?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank" rel="noopener noreferrer">オープンチャットに参加する</a>
    </div>
    <p class="small" style="margin-top:12px">※公式LINE登録だけのお得な情報もあります。</p>
  </section>
</main>
<footer class="container" style="padding:40px 0;border-top:1px solid #222">
  <p class="small">© BCC</p>
</footer>
</body>
</html>
