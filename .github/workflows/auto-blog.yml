name: Auto Blog

# Generates one SEO/LLMO "column" article with Claude, then publishes it to
# main ONLY if the build and all validators pass. Requires repository secret
# ANTHROPIC_API_KEY. Runs weekly + on-demand.
on:
  schedule:
    - cron: "0 0 * * 1,3,5" # Mon/Wed/Fri 00:00 UTC (~週3回)
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional topic to write about (overrides the seed list)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: auto-blog
  cancel-in-progress: false

jobs:
  generate:
    name: Generate & publish article
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_TOPIC: ${{ inputs.topic }}
        run: npm run generate:post

      # Publish gate: a hallucinated or malformed article fails here and is
      # never committed (build/validate run on the modified working tree).
      - name: Build
        run: npm run build
        env:
          PUBLIC_SITE_URL: https://ile-hair-harajuku.com

      - name: Validate (structured data, a11y, SEO, links)
        run: npm run validate

      - name: Commit & push if a new article was generated
        run: |
          if git diff --quiet -- src/data/blog-generated.json; then
            echo "No new article — nothing to publish."
            exit 0
          fi
          git config user.name "ile-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/data/blog-generated.json
          TITLE=$(node -e "const a=require('./src/data/blog-generated.json');console.log(a[a.length-1].title)")
          git commit -m "content(blog): auto-publish column — ${TITLE}"
          git push origin HEAD:main
